<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#240e44" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link
      rel="icon"
      href="/static/images/playground-mode.png"
      type="image/png"
    />
    <title>WebScape</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&display=swap"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap");

      :root {
        --bg-color: #240e44;
        --secondary-color: #2d2c2f;
        --accent-color: #ff66c4;
      }
      body,
      html {
        scrollbar-width: thin;
        scrollbar-color: var(--accent-color) var(--secondary-color);
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: var(--bg-color);
        color: #a9a9a9;
        font-family: "Montserrat", sans-serif;
      }

      .login-input {
        background-color: transparent;
        border: none;
        border-bottom: 2px solid #fff;
        border-radius: 0;
        color: #fff;
      }

      .login-input::placeholder {
        color: #aaa;
      }

      .btn-pink {
        background-color: #ff5fc5;
        color: white;
        font-weight: bold;
        letter-spacing: 1px;
        border-radius: 8px;
      }

      .btn-pink:hover {
        background-color: #ff40b5;
      }

      .text-pink {
        color: #ff5fc5;
        cursor: pointer;
      }

      .text-pink:hover {
        color: #ff40b5;
        text-decoration: underline;
      }
      /* ------- */
      .sidebar {
        background-color: #3a1464;
        width: 90px;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 20px;
        gap: 50px;
        z-index: 200;
      }
      .sidebar .nav-item {
        text-align: center;
        font-weight: 500;
        font-size: 14px;
        color: #a9a9a9;
        user-select: none;
        cursor: pointer;
      }
      .sidebar .nav-item i {
        font-size: 28px;
        display: block;
        margin-bottom: 6px;
        color: #a9a9a9;
      }
      .sidebar .nav-item.badges i {
        color: #bfbfbf;
      }
      .sidebar .nav-item.account i {
        font-size: 32px;
        color: #bfbfbf;
      }
      .sidebar .nav-item:hover {
        color: #ff69b4;
      }
      .sidebar .nav-item:hover i {
        color: #ff69b4;
      }

      main {
        margin-left: 90px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 0 15px;
      }
      .section {
        margin-left: 80px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 0 15px;
      }
      .section h1 {
        font-family: "Luckiest Guy", sans-serif;
        font-size: 4vw;
        color: #ff69b4;
        margin-bottom: 0;
        user-select: none;
      }
      h1 {
        font-family: "Luckiest Guy", sans-serif;
        font-size: calc(1.375rem + 1.5vw);
        color: #ff69b4;
        margin-bottom: 0;
        user-select: none;
      }
      h2 {
        font-family: "Anton", sans-serif;
        font-weight: 700;
        font-size: 2.3vw;
        color: #6f2dbd;
        margin-top: 0;
        user-select: none;
      }
      .book-icon {
        color: #b3b3b3;
        font-size: 18vw;
        width: 300px;
        user-select: none;
        margin-bottom: 50px;
      }
      .card {
        background-color: #371569;
        border: 3px solid #7e31ef;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;

        &:hover {
          /* up slightly */
          transform: translateY(-15px);
          transition: transform 0.2s ease-in-out;
          box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
          background-color: #481c89;
        }
      }

      .section-title,
      .section-title a {
        color: white;
        font-family: "Luckiest Guy", cursive;
        font-size: 24px;
        margin-bottom: 10px;
        text-decoration: none;

        &:hover {
          color: var(--accent-color);
        }
      }
      .main-content {
        margin-left: 90px;
        padding: 20px;
      }

      .card h2 {
        font-family: "Anton", cursive;
        font-size: 2rem;
        color: #d1d1d3;
        user-select: none;
      }
      .card p {
        font-size: 0.9rem;
        text-align: left;
        color: #8a8a8f;
      }
      .btn-pink {
        background-color: var(--accent-color);
        border: none;
        font-family: "Luckiest Guy", cursive;
        font-weight: 700;
        font-size: 1.1rem;
        color: white;
        user-select: none;
      }
      .btn-pink:hover,
      .btn-pink:focus {
        background-color: #c54fa3;
        color: white;
      }
      .card-img-top {
        width: 100%;
        height: auto;
        max-height: 190px;
        object-fit: contain;
        margin-bottom: 1rem;
      }

      /* ========== MOBILE APP STYLES ========== */
      @media (max-width: 768px) {
        body {
          overscroll-behavior-y: none;
          background: linear-gradient(180deg, #240e44 0%, #1a0a30 100%);
        }

        /* Top Navigation Bar */
        .sidebar {
          position: fixed !important;
          top: 0 !important;
          left: 0 !important;
          right: 0 !important;
          width: 100vw !important;
          max-width: 100vw !important;
          height: 56px !important;
          padding: 0 !important;
          gap: 0 !important;

          flex-direction: row !important;
          justify-content: space-around !important;
          align-items: center !important;

          background: rgba(58, 20, 100, 0.95) !important;
          border-bottom: 1px solid rgba(255, 255, 255, 0.08);
          box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);

          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
        }

        .sidebar .nav-item {
          margin: 0 !important;
          width: auto !important;
          min-width: 56px;
          height: 100% !important;
          flex: 1 1 auto !important;
          max-width: 70px;
          gap: 0 !important;

          display: flex !important;
          flex-direction: column !important;
          align-items: center !important;
          justify-content: center !important;

          padding: 10px 8px !important;
          border-radius: 0 !important;
        }

        .sidebar .nav-item a {
          display: flex !important;
          flex-direction: column !important;
          align-items: center !important;
          justify-content: center !important;
          color: inherit;
          width: 100%;
          height: 100%;
          text-decoration: none !important;
        }

        .sidebar .nav-item i {
          font-size: 1.5rem;
          margin-bottom: 0;
        }

        /* Hide labels - icons only */
        .sidebar .nav-item span {
          display: none !important;
        }

        .sidebar .nav-item:active {
          background: rgba(255, 255, 255, 0.1);
        }

        /* Main Content Area */
        .main-content {
          margin-left: 0 !important;
          padding: 72px 16px 32px 16px;
          min-height: 100vh;
        }

        /* Back Link / Section Title */
        .section-title {
          font-size: 0.9rem;
          margin-bottom: 16px;
          opacity: 0.8;
        }

        .section-title a {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          padding: 8px 16px;
          background: rgba(255, 255, 255, 0.05);
          border-radius: 20px;
          border: 1px solid rgba(255, 255, 255, 0.1);
          transition: all 0.2s ease;
        }

        .section-title a:hover {
          background: rgba(255, 255, 255, 0.1);
        }

        /* Page Title */
        h1 {
          font-size: 1.6rem !important;
          margin-bottom: 20px !important;
          text-shadow: 0 2px 10px rgba(255, 105, 180, 0.3);
        }

        /* Cards Grid */
        .container {
          padding: 0;
          max-width: 100%;
        }

        .row {
          margin: 0 -8px;
          display: flex;
          flex-wrap: wrap;
        }

        /* Two cards per row on tablet */
        .col-12.col-md-4 {
          flex: 0 0 100%;
          max-width: 100%;
          padding: 0 8px;
          margin-bottom: 16px;
        }

        .card {
          padding: 24px 20px !important;
          border-radius: 20px;
          background: linear-gradient(
            145deg,
            #371569 0%,
            #2a1050 100%
          ) !important;
          border: 2px solid rgba(126, 49, 239, 0.5) !important;
          box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
          transition: transform 0.2s ease, box-shadow 0.2s ease;
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        .card:active {
          transform: scale(0.98);
        }

        .card-img-top {
          width: auto;
          height: 140px;
          max-width: 180px;
          object-fit: contain;
          margin-bottom: 16px;
          filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
        }

        .card h2 {
          font-size: 1.6rem;
          margin-bottom: 10px;
          color: #fff;
        }

        .card p {
          font-size: 0.9rem;
          margin-bottom: 16px;
          text-align: center;
          line-height: 1.5;
          color: #b3b3b3;
          display: -webkit-box;
          -webkit-line-clamp: 3;
          -webkit-box-orient: vertical;
          overflow: hidden;
        }

        .btn-pink {
          padding: 14px 24px;
          font-size: 1rem;
          border-radius: 14px;
          background: linear-gradient(90deg, #ff66c4 0%, #c54fa3 100%);
          box-shadow: 0 4px 15px rgba(255, 102, 196, 0.3);
          transition: all 0.2s ease;
        }

        .btn-pink:active {
          transform: scale(0.97);
          box-shadow: 0 2px 8px rgba(255, 102, 196, 0.3);
        }
      }

      /* Small phones */
      @media (max-width: 400px) {
        h1 {
          font-size: 1.4rem !important;
        }

        .card-img-top {
          height: 120px;
          max-width: 150px;
        }

        .card h2 {
          font-size: 1.4rem;
        }

        .card p {
          font-size: 0.85rem;
        }

        .btn-pink {
          padding: 12px 20px;
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="sidebar d-flex flex-column align-items-center">
      <div class="nav-item levels">
        <a href="/">
          <i class="fas fa-home" aria-hidden="true"></i>
          <span>Home</span>
        </a>
      </div>
      <div class="nav-item badges">
        <i class="fas fa-trophy" aria-hidden="true"></i>
        <span>Ranking</span>
      </div>
      <div class="nav-item options">
        <i class="fas fa-paint-brush" aria-hidden="true"></i>
        <span>Options</span>
      </div>
      <div
        class="nav-item account mt-auto mb-4"
        onclick="window.location.href='/account'"
      >
        <i class="fas fa-user-circle" aria-hidden="true"></i>
        <span>Account</span>
      </div>
    </nav>

    <div class="main-content">
      <div class="section-title">
        <a href="/#game-modes"
          ><i class="fas fa-angle-left" style="margin-right: 1rem"></i>
          Classic</a
        >
      </div>
      <h1
        class="text-center"
        style="font-family: 'Luckiest Guy', cursive; color: #ff69b4"
      >
        Choose a level
      </h1>
      <div class="container">
        <div class="row mt-3 text-center g-4 justify-content-center">
          {% for level in levels %}
          <div class="col-12 col-md-4">
            <div class="card p-3 h-100 d-flex flex-column align-items-center">
              <img alt="{{ level.title }} logo" class="card-img-top"
              height="200" src="{{ level.image_url or ('/static/images/' ~
              (level.title|lower) ~ '-logo.png') }}" width="300" {% if level.id
              == 1 %}style="transform: scale(1.5);"{% endif %} />
              <h2>{{ level.title }}</h2>
              <p>{{ level.description }}</p>
              <button
                class="btn btn-pink mt-auto w-100"
                onclick="startLevel('{{ level.title }}')"
              >
                START
              </button>
            </div>
          </div>
          {% endfor %}
        </div>
      </div>
    </div>

    <script>
      function startLevel(level) {
        // Convert level title to lowercase for URL
        const formattedLevel = level.toLowerCase();
        window.location.href = `/user/classic/${formattedLevel}`;
      }
    </script>
  </body>
</html>
